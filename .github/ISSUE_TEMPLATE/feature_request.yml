name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Please describe the problem you're trying to solve — not just the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the friction or limitation you're hitting.
      placeholder: I'm always having to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution. Be as specific or vague as you want.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Hush would this affect?
      options:
        - Daemon (Rust)
        - Browser UI
        - Terminal / xterm.js
        - Gossip / mesh
        - CLI / startup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there other approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, links, related issues.
    validations:
      required: false
