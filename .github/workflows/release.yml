name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ matrix.target }}-cargo-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build daemon binaries
        working-directory: daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build

      - name: Package tarball
        run: |
          TARGET=${{ matrix.target }}
          ARCH=${TARGET%%-*}    # aarch64 or x86_64
          NAME="hush-darwin-${ARCH}"
          mkdir -p "dist/${NAME}"
          cp daemon/target/${TARGET}/release/hush      "dist/${NAME}/"
          cp daemon/target/${TARGET}/release/hush-hook "dist/${NAME}/"
          cp -r ui/dist                                "dist/${NAME}/ui"
          tar -czf "${NAME}.tar.gz" -C dist "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" >> checksums.txt

      - name: Upload tarball
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hush-darwin-*.tar.gz
            checksums.txt

  homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        run: |
          TAG=${{ github.ref_name }}
          gh release download "${TAG}" \
            --repo hushctl/hush \
            --pattern "hush-darwin-*.tar.gz" \
            --pattern "checksums.txt"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "arm=$(shasum -a 256 hush-darwin-aarch64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86=$(shasum -a 256 hush-darwin-x86_64.tar.gz  | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hushctl/homebrew-hush
          token: ${{ secrets.TAP_TOKEN }}
          path: homebrew-hush

      - name: Write formula
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          ARM_SHA=${{ steps.sha.outputs.arm }}
          X86_SHA=${{ steps.sha.outputs.x86 }}

          mkdir -p homebrew-hush/Formula
          cat > homebrew-hush/Formula/hush.rb <<FORMULA
          class Hush < Formula
            desc "Agent harness for Claude Code — one screen for all your sessions, across all your machines"
            homepage "https://github.com/hushctl/hush"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/hushctl/hush/releases/download/v${VERSION}/hush-darwin-aarch64.tar.gz"
                sha256 "${ARM_SHA}"
              end

              on_intel do
                url "https://github.com/hushctl/hush/releases/download/v${VERSION}/hush-darwin-x86_64.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "hush"
              bin.install "hush-hook"
              (prefix/"ui").install Dir["ui/*"]
            end

            def caveats
              <<~EOS
                On first run, hush installs its TLS CA into your OS trust store.
                macOS will prompt for your password once.

                Start hush:
                  hush

                Then open https://localhost:9111 in your browser.

                For multi-machine setup:
                  https://github.com/hushctl/hush#multiple-machines
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hush --version 2>&1")
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: homebrew-hush
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/hush.rb
          git commit -m "hush ${{ steps.sha.outputs.version }}"
          git push
