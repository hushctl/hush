name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm — native
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: hush-darwin-aarch64.tar.gz

          # macOS x86 — cross-compiled from arm runner (Apple toolchain supports both)
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: hush-darwin-x86_64.tar.gz

          # Linux x86 — native
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: hush-linux-x86_64.tar.gz

          # Linux arm — cross-compiled via gcc-aarch64-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: hush-linux-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        working-directory: daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          TARGET_DIR="daemon/target/${{ matrix.target }}/release"
          tar -czf "${{ matrix.asset_name }}" -C "$TARGET_DIR" hush hush-hook

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum hush-*.tar.gz > checksums.txt

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            hush-*.tar.gz
            checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
